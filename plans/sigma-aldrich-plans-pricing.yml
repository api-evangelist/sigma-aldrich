description: Sigma-Aldrich (a MilliporeSigma / Merck KGaA brand) does not publish a self-service public
  API pricing surface. Catalog, ordering, and procurement integrations (e.g., punchout, eProcurement,
  iPriceLink) are arranged through MilliporeSigma's customer integration teams as part of B2B procurement
  enablement; revenue flows through product sales rather than per-API-call charges.

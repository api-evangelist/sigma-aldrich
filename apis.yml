description: >-
  Sigma-Aldrich was a leading life science and high technology company whose
  biochemical and organic chemical products, kits, and services are used in
  scientific research, including genomics, proteomics, and drug discovery.
  Acquired by Merck KGaA in 2015, Sigma-Aldrich now operates as part of
  MilliporeSigma in North America and Merck in other regions, continuing to
  provide the world's largest catalog of research chemicals, biochemicals,
  laboratory equipment, and life science products to researchers globally.

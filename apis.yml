apis:
  - aid: sigma-aldrich:sigma-aldrich-product-api
    name: Sigma-Aldrich Product Search API
    tags:
      - Life Science
      - Chemistry
      - Products
      - Search
    humanURL: https://www.sigmaaldrich.com/US/en/technical-documents/technical-article/chemistry/labware/sigma-aldrich-developer-portal
    properties:
      - url: https://www.sigmaaldrich.com/US/en/technical-documents/technical-article/chemistry/labware/sigma-aldrich-developer-portal
        type: Documentation
      - url: openapi/sigma-aldrich-product-openapi.yml
        type: OpenAPI
      - url: rules/sigma-aldrich-rules.yml
        type: SpectralRules
      - url: capabilities/chemical-research.yaml
        type: Capabilities
      - url: json-schema/sigma-aldrich-product-schema.json
        type: JSONSchema
      - url: json-ld/sigma-aldrich-context.jsonld
        type: JSONLD
      - url: vocabulary/sigma-aldrich-vocabulary.yml
        type: Vocabulary
    description: >-
      The Sigma-Aldrich Product Search API provides programmatic access to
      the Sigma-Aldrich product catalog containing hundreds of thousands of
      chemical compounds, reagents, biochemicals, and laboratory supplies.
      Researchers and laboratory information management systems (LIMS) can
      query products by CAS number, catalog number, product name, or chemical
      structure (SMILES notation) to retrieve product details, safety data,
      pricing, and availability information.

  - aid: sigma-aldrich:sigma-aldrich-structure-search-api
    name: Sigma-Aldrich Chemical Structure Search API
    tags:
      - Chemistry
      - Cheminformatics
      - Structure Search
      - SMILES
    humanURL: https://www.sigmaaldrich.com/US/en/support/contact-us
    properties:
      - url: https://www.sigmaaldrich.com/US/en/support/contact-us
        type: Documentation
    description: >-
      The Sigma-Aldrich Chemical Structure Search API enables substructure,
      exact structure, and similarity searches against the Sigma-Aldrich
      chemical catalog using SMILES, InChI, or molecular formula notation.
      Supports configuring similarity thresholds and returning ranked results
      for drug discovery, materials research, and synthetic chemistry workflows.

  - aid: sigma-aldrich:sigma-aldrich-sds-api
    name: Sigma-Aldrich Safety Data Sheet API
    tags:
      - Safety
      - SDS
      - GHS
      - Compliance
    humanURL: https://www.sigmaaldrich.com/US/en/support/sds-portal
    properties:
      - url: https://www.sigmaaldrich.com/US/en/support/sds-portal
        type: Documentation
    description: >-
      The Safety Data Sheet (SDS) API provides programmatic access to GHS-
      compliant Safety Data Sheets for all Sigma-Aldrich chemical products.
      Enables EHS systems, LIMS platforms, and safety management software
      to retrieve current SDSs in multiple languages and formats for
      regulatory compliance and laboratory safety management.


naftiko: "1.0.0-alpha1"

info:
  label: "Sigma-Aldrich Product Search API"
  description: "Product catalog search, structure-based lookup, safety data sheet retrieval, and pricing for Sigma-Aldrich research chemicals and biochemicals."
  tags:
    - Life Science
    - Chemistry
    - Products
    - Search
    - Safety
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SIGMA_ALDRICH_API_KEY: SIGMA_ALDRICH_API_KEY

capability:
  consumes:
    - type: http
      namespace: sigma-aldrich
      baseUri: https://api.sigmaaldrich.com/v1
      description: "Sigma-Aldrich Product Search and Safety Data Sheet REST API"
      authentication:
        type: apikey
        key: x-api-key
        value: "{{SIGMA_ALDRICH_API_KEY}}"
        placement: header
      resources:
        - name: product-search
          path: /products/search
          description: "Product catalog keyword search"
          operations:
            - name: search-products
              method: GET
              description: "Search Sigma-Aldrich product catalog"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Search query"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
                - name: brand
                  in: query
                  type: string
                  required: false
                  description: "Brand filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: product-by-catalog
          path: /products/{catalogNumber}
          description: "Product lookup by catalog number"
          operations:
            - name: get-product
              method: GET
              description: "Get product details by catalog number"
              inputParameters:
                - name: catalogNumber
                  in: path
                  type: string
                  required: true
                  description: "Sigma-Aldrich catalog number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: product-by-cas
          path: /products/cas/{casNumber}
          description: "Product lookup by CAS number"
          operations:
            - name: get-product-by-cas
              method: GET
              description: "Get products by CAS Registry Number"
              inputParameters:
                - name: casNumber
                  in: path
                  type: string
                  required: true
                  description: "CAS Registry Number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: structure-search
          path: /structures/search
          description: "Chemical structure search"
          operations:
            - name: search-by-structure
              method: POST
              description: "Search by chemical structure (SMILES/InChI)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  structure: "{{tools.structure}}"
                  searchType: "{{tools.searchType}}"
                  notation: "{{tools.notation}}"

        - name: product-sds
          path: /products/{catalogNumber}/sds
          description: "Safety Data Sheet retrieval"
          operations:
            - name: get-product-sds
              method: GET
              description: "Get GHS Safety Data Sheet for a product"
              inputParameters:
                - name: catalogNumber
                  in: path
                  type: string
                  required: true
                  description: "Catalog number"
                - name: language
                  in: query
                  type: string
                  required: false
                  description: "Language code"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: product-pricing
          path: /products/{catalogNumber}/pricing
          description: "Product pricing and availability"
          operations:
            - name: get-product-pricing
              method: GET
              description: "Get pricing and stock availability"
              inputParameters:
                - name: catalogNumber
                  in: path
                  type: string
                  required: true
                  description: "Catalog number"
                - name: country
                  in: query
                  type: string
                  required: false
                  description: "Country code"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: sigma-aldrich-rest
      resources:
        - path: /v1/products/search
          name: product-search
          operations:
            - method: GET
              name: search-products
              description: "Search product catalog"

    - type: mcp
      port: 9100
      namespace: sigma-aldrich-mcp
      transport: http
      tools:
        - name: search-products
          description: "Search Sigma-Aldrich chemical and biochemical product catalog"
          hints:
            readOnly: true
            openWorld: true
          call: "sigma-aldrich.search-products"
          outputParameters:
            - type: object
              mapping: "$."

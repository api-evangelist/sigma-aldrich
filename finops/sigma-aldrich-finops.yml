description: FOCUS-aligned FinOps placeholder for Sigma-Aldrich (MilliporeSigma). API integrations
  are not billed as a discrete line; cost flows through product purchases (reagents, consumables,
  equipment) and contracted procurement terms. No public usage telemetry or per-call billing surface
  exists.
sources:
  - https://www.sigmaaldrich.com/
notes: No public API billing model. FinOps treatment is procurement-driven; reconciliation pending
  direct vendor confirmation.

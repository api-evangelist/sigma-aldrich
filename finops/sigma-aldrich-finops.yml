meters:
  - name: catalog_orders
    description: Orders placed via the procurement integration; cost flows through product price and
      negotiated contract pricing rather than per-API-call charges.
    unit: order
    aggregation: sum
    dimensions:
      - account
      - product_category
      - region
principles:
  - name: Visibility
    description: Spend visibility comes from the lab/procurement system that issues purchase orders
      and the supplier invoice; API call volume does not appear on an invoice.
  - name: Allocation
    description: Allocate by purchase order, requesting lab/cost center, project/grant, and product
      category captured in the procurement system.
  - name: Optimization
    description: Optimization is procurement-led — negotiate volume discounts, consolidate orders to
      reduce shipping, and use punchout to enforce contract pricing rather than tuning API patterns.
  - name: Accountability
    description: Lab procurement and finance own Sigma-Aldrich spend; integration owners ensure punchout
      and order traffic stays within contract terms.
